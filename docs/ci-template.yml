# CI テンプレート
# 各リポジトリの .github/workflows/ci.yml にコピーしてカスタマイズする
#
# カスタマイズポイント:
# - Rust のみ: frontend ジョブを削除
# - Node.js のみ: backend ジョブを削除
# - Python: backend ジョブを Python 用に書き換え
# - PostgreSQL 不要: services セクションを削除

name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # === Rust バックエンド ===
  # 不要な場合はこのジョブごと削除
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest

    # PostgreSQL が不要なら services セクションを削除
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: test
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://app:test@localhost:5432/app_test

    # working-directory をリポ構成に合わせて変更
    # モノレポでない場合は defaults セクションを削除
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # マイグレーションがある場合
      - name: Run migrations
        run: |
          for f in migrations/*.sql; do
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

  # === Node.js フロントエンド ===
  # 不要な場合はこのジョブごと削除
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    # working-directory をリポ構成に合わせて変更
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # テストがある場合
      # - name: Test
      #   run: npm test

  # === Python ===
  # Rust/Node.js の代わりに使う場合
